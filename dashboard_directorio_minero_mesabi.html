<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESABI — Directorio Minero Sonora 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C07A28;--bg:#0f1117;--card:#1a1d27;--card2:#22252f;--border:#2a2d37;--text:#e4e4e7;--text2:#9ca3af;--red:#dc2626;--red-bg:rgba(220,38,38,.12);--green:#22c55e;--yellow:#eab308;--teal:#14b8a6;--purple:#a855f7;--blue:#3b82f6;--orange:#f97316;--gray:#6b7280}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
.container{max-width:1600px;margin:0 auto;padding:20px}

/* Header */
.header{text-align:center;padding:30px 20px 20px;border-bottom:2px solid var(--gold)}
.header h1{font-size:2rem;color:var(--gold);letter-spacing:2px;margin-bottom:4px}
.header .subtitle{color:var(--text2);font-size:.95rem;margin-bottom:6px}
.header .generated{color:var(--text2);font-size:.8rem;opacity:.7}

/* KPI Cards */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin:24px 0}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 16px;text-align:center;transition:transform .15s}
.kpi:hover{transform:translateY(-2px)}
.kpi .kpi-val{font-size:1.7rem;font-weight:700;color:var(--gold)}
.kpi .kpi-label{font-size:.78rem;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.kpi.highlight{border-color:var(--gold);background:rgba(192,122,40,.08)}
.kpi.red-hl .kpi-val{color:var(--red)}

/* Filters */
.filters{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:20px 0 10px;padding:16px;background:var(--card);border-radius:10px;border:1px solid var(--border)}
.filters input[type=text]{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:6px;font-size:.88rem;width:260px;outline:none}
.filters input[type=text]:focus{border-color:var(--gold)}
.filters select{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:.88rem;outline:none;cursor:pointer;min-width:160px}
.filters select:focus{border-color:var(--gold)}
.btn{background:var(--gold);color:#fff;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;font-size:.85rem;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-csv{background:#22c55e}

/* Active filter chips */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.chip{background:rgba(192,122,40,.18);color:var(--gold);padding:4px 12px;border-radius:20px;font-size:.78rem;display:flex;align-items:center;gap:6px}
.chip .x{cursor:pointer;font-weight:700;opacity:.7}
.chip .x:hover{opacity:1}

/* Table */
.table-wrap{overflow-x:auto;margin-top:10px;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.82rem}
thead th{background:var(--card);color:var(--gold);padding:10px 8px;text-align:left;cursor:pointer;user-select:none;white-space:nowrap;position:sticky;top:0;border-bottom:2px solid var(--gold)}
thead th:hover{background:var(--card2)}
thead th .sort-arrow{margin-left:4px;opacity:.4;font-size:.7rem}
thead th.sorted .sort-arrow{opacity:1}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:rgba(192,122,40,.06)}
tbody tr.row-noodoo{background:var(--red-bg)}
tbody tr.row-noodoo:hover{background:rgba(220,38,38,.18)}
tbody td{padding:8px;vertical-align:top;white-space:nowrap}
td.wrap{white-space:normal;max-width:200px}

/* Semáforo */
.sem{font-size:1.1rem;text-align:center}

/* Section badges */
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.72rem;font-weight:600;color:#fff;white-space:nowrap}
.badge-metalica{background:var(--gold)}
.badge-nometalica{background:var(--teal)}
.badge-exploracion{background:var(--purple)}
.badge-perforacion{background:var(--blue)}
.badge-contratistas{background:var(--orange)}
.badge-maquinaria{background:var(--green)}
.badge-construccion{background:var(--gray)}

/* Expand row */
.expand-row{display:none}
.expand-row td{padding:12px 20px;background:var(--card2);border-bottom:2px solid var(--border)}
.expand-content{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px 24px;font-size:.82rem}
.expand-content .el{color:var(--text2)}
.expand-content .el strong{color:var(--text)}
.expand-content a{color:var(--gold);text-decoration:none}
.expand-content a:hover{text-decoration:underline}

/* Pagination */
.pagination{display:flex;justify-content:space-between;align-items:center;padding:14px 0;font-size:.85rem;color:var(--text2)}
.pagination .page-btns{display:flex;gap:6px}
.pagination .page-btns button{background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.82rem}
.pagination .page-btns button:hover{border-color:var(--gold);color:var(--gold)}
.pagination .page-btns button.active{background:var(--gold);color:#fff;border-color:var(--gold)}
.pagination .page-btns button:disabled{opacity:.3;cursor:default}

/* Email link */
a.email-link{color:var(--blue);text-decoration:none}
a.email-link:hover{text-decoration:underline}

/* Clickable row */
.clickable{cursor:pointer}

/* Revenue */
.revenue{color:var(--green);font-weight:600}

/* Responsive */
@media(max-width:768px){
  .kpi-grid{grid-template-columns:repeat(3,1fr)}
  .filters{flex-direction:column}
  .filters input[type=text]{width:100%}
  .filters select{width:100%}
}
</style>
</head>

</div>

// === HELPERS ===
const fmt = n => n ? '$' + Number(n).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2}) : '$0.00';
const fmtShort = n => {
  if(!n || n===0) return '$0';
  if(n>=1e6) return '$'+( n/1e6).toFixed(1)+'M';
  if(n>=1e3) return '$'+(n/1e3).toFixed(0)+'K';
  return '$'+n.toFixed(0);
};

function semaforo(s){
  const m={'ACTIVO':'🟢','COTIZADO':'🟡','EN ODOO':'⚪','NO EN ODOO':'🔴'};
  return m[s]||'⚫';
}

function badgeClass(sec){
  if(sec.includes('NO METÁLICA')) return 'badge-nometalica';
  if(sec.includes('METÁLICA')) return 'badge-metalica';
  if(sec.includes('EXPLORACIÓN')) return 'badge-exploracion';
  if(sec.includes('PERFORACIÓN')) return 'badge-perforacion';
  if(sec.includes('CONTRATISTAS')) return 'badge-contratistas';
  if(sec.includes('MAQUINARIA')) return 'badge-maquinaria';
  if(sec.includes('CONSTRUCCIÓN')) return 'badge-construccion';
  return '';
}

function shortSec(s){
  return s.replace('MINERÍA ','').replace('EMPRESAS DE ','').replace('PERFORACIÓN MINERA','PERFORACIÓN').replace('CONTRATISTAS MINEROS','CONTRATISTAS').replace('MAQUINARIA Y EQUIPO','MAQUINARIA');
}

function emailLinks(e){
  if(!e) return '';
  return e.split(/[|\/,]/).map(x=>x.trim()).filter(Boolean).map(x=>`<a class="email-link" href="mailto:${x}">${x}</a>`).join('<br>');
}

function renderKPIs(){
  const total = filtered.length;
  const enOdoo = filtered.filter(r=>r.en_odoo==='Sí').length;
  const activo = filtered.filter(r=>r.status==='ACTIVO').length;
  const cotizado = filtered.filter(r=>r.status==='COTIZADO'||r.cotizaciones>0).length;
  const noOdoo = filtered.filter(r=>r.en_odoo==='No').length;
  const rev = filtered.reduce((s,r)=>s+(r.revenue_mxn||0),0);

  const cards = [
    {label:'Total Empresas',val:total,cls:'highlight'},
    {label:'En Odoo',val:enOdoo,cls:''},
    {label:'Activos',val:activo,cls:''},
    {label:'Cotizadas',val:cotizado,cls:''},
    {label:'NO en Odoo',val:noOdoo,cls:'red-hl'},
    {label:'Revenue MXN',val:fmtShort(rev),cls:'highlight'}
  ];

  document.getElementById('kpiGrid').innerHTML = cards.map(c=>
    `<div class="kpi ${c.cls}"><div class="kpi-val">${c.val}</div><div class="kpi-label">${c.label}</div></div>`
  ).join('');
}

// === FILTERS ===
function populateFilters(){
  const secs = [...new Set(DATA.map(r=>r.seccion))].sort();
  const stats = [...new Set(DATA.map(r=>r.status))].sort();
  const vends = [...new Set(DATA.map(r=>r.vendedor).filter(Boolean))].sort();
  const fS = document.getElementById('filterSeccion');
  const fSt = document.getElementById('filterStatus');
  const fV = document.getElementById('filterVendedor');
  secs.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;fS.appendChild(o)});
  stats.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;fSt.appendChild(o)});
  vends.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;fV.appendChild(o)});
}

function applyFilters(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sec = document.getElementById('filterSeccion').value;
  const stat = document.getElementById('filterStatus').value;
  const vend = document.getElementById('filterVendedor').value;

  filtered = DATA.filter(r=>{
    if(sec && r.seccion!==sec) return false;
    if(stat && r.status!==stat) return false;
    if(vend && r.vendedor!==vend) return false;
    if(q){
      const hay = [r.empresa,r.mina,r.mineral,r.contacto,r.vendedor,r.email,r.telefono,r.direccion].join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  if(sortCol!==null) doSort(sortCol,false);
  currentPage=1;
  renderKPIs();
  renderChips();
  renderTable();
}

function clearFilters(){
  document.getElementById('searchInput').value='';
  document.getElementById('filterSeccion').value='';
  document.getElementById('filterStatus').value='';
  document.getElementById('filterVendedor').value='';
  applyFilters();
}

function renderChips(){
  const chips=[];
  const sec=document.getElementById('filterSeccion').value;
  const stat=document.getElementById('filterStatus').value;
  const vend=document.getElementById('filterVendedor').value;
  const q=document.getElementById('searchInput').value;
  if(q) chips.push({label:`Búsqueda: "${q}"`,clear:()=>{document.getElementById('searchInput').value='';applyFilters()}});
  if(sec) chips.push({label:sec,clear:()=>{document.getElementById('filterSeccion').value='';applyFilters()}});
  if(stat) chips.push({label:stat,clear:()=>{document.getElementById('filterStatus').value='';applyFilters()}});
  if(vend) chips.push({label:vend,clear:()=>{document.getElementById('filterVendedor').value='';applyFilters()}});
  const el=document.getElementById('chips');
  el.innerHTML=chips.map((_,i)=>`<span class="chip">${chips[i].label} <span class="x" data-i="${i}">✕</span></span>`).join('');
  el.querySelectorAll('.x').forEach(x=>x.addEventListener('click',e=>{chips[+e.target.dataset.i].clear()}));
}

function doSort(colIdx,toggle=true){

  const col=COLUMNS[sortCol];
  filtered.sort((a,b)=>{
    let va=a[col.key], vb=b[col.key];
    if(col.type==='num'){va=va||0;vb=vb||0;return sortAsc?va-vb:vb-va}
    va=(va||'').toString().toLowerCase();vb=(vb||'').toString().toLowerCase();
    return sortAsc?va.localeCompare(vb):vb.localeCompare(va);
  });
}

// === RENDER TABLE ===
function renderHeader(){
  const tr=document.createElement('tr');
  COLUMNS.forEach((c,i)=>{
    const th=document.createElement('th');
    th.innerHTML=c.label+(c.sortable?`<span class="sort-arrow">${sortCol===i?(sortAsc?'▲':'▼'):'⇅'}</span>`:'');
    if(sortCol===i) th.classList.add('sorted');
    if(c.sortable) th.addEventListener('click',()=>{doSort(i);currentPage=1;renderTable()});
    tr.appendChild(th);
  });
  document.getElementById('thead').innerHTML='';
  document.getElementById('thead').appendChild(tr);
}

function renderTable(){
  renderHeader();
  const start=(currentPage-1)*PAGE_SIZE;
  const page=filtered.slice(start,start+PAGE_SIZE);
  const tbody=document.getElementById('tbody');
  tbody.innerHTML='';

  page.forEach((r,idx)=>{
    const tr=document.createElement('tr');
    tr.className='clickable'+(r.status==='NO EN ODOO'?' row-noodoo':'');
    const rid='row-'+start+idx;

    tr.innerHTML=`
      <td class="sem">${semaforo(r.status)}</td>
      <td><strong>${r.empresa}</strong></td>
      <td>${r.mina||'—'}</td>
      <td><span class="badge ${badgeClass(r.seccion)}">${shortSec(r.seccion)}</span></td>
      <td class="wrap">${r.mineral||'—'}</td>
      <td>${r.vendedor||'—'}</td>
      <td style="text-align:center">${r.cotizaciones||0}</td>
      <td style="text-align:center">${r.facturas||0}</td>
      <td class="revenue">${fmt(r.revenue_mxn)}</td>
      <td>${r.ultima_actividad||'—'}</td>
      <td class="wrap">${r.contacto||'—'}</td>
      <td>${r.telefono||'—'}</td>
      <td>${emailLinks(r.email)}</td>
    `;

    tr.addEventListener('click',()=>{
      const er=document.getElementById(rid);
      if(er) er.style.display=er.style.display==='none'?'table-row':'none';
    });
    tbody.appendChild(tr);

    // Expand row
    const etr=document.createElement('tr');
    etr.className='expand-row';
    etr.id=rid;
    etr.style.display='none';
    etr.innerHTML=`<td colspan="${COLUMNS.length}"><div class="expand-content">
      <div class="el"><strong>📍 Dirección:</strong> ${r.direccion||'—'}</div>
      <div class="el"><strong>🌐 Web:</strong> ${r.web?`<a href="${r.web.startsWith('http')?r.web:'https://'+r.web}" target="_blank">${r.web}</a>`:'—'}</div>
      <div class="el"><strong>🆔 Odoo ID:</strong> ${r.odoo_id||'—'}</div>
      <div class="el"><strong>📊 CRM Opps:</strong> ${r.crm_opps||0}</div>
      <div class="el"><strong>📌 Estado:</strong> ${r.estado||'—'}</div>
      <div class="el"><strong>🏷️ En Odoo:</strong> ${r.en_odoo}</div>
    </div></td>`;
    tbody.appendChild(etr);
  });

  renderPagination();
}

function renderPagination(){
  const total=filtered.length;
  const pages=Math.ceil(total/PAGE_SIZE)||1;
  const start=(currentPage-1)*PAGE_SIZE+1;
  const end=Math.min(currentPage*PAGE_SIZE,total);

  let html=`<span>Mostrando ${total>0?start:0}–${end} de ${total} empresas</span><div class="page-btns">`;
  html+=`<button ${currentPage<=1?'disabled':''} onclick="goPage(${currentPage-1})">← Anterior</button>`;
  for(let p=1;p<=pages;p++){
    html+=`<button class="${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
  }
  html+=`<button ${currentPage>=pages?'disabled':''} onclick="goPage(${currentPage+1})">Siguiente →</button>`;
  html+='</div>';
  document.getElementById('pagination').innerHTML=html;
}

function goPage(p){
  currentPage=p;
  renderTable();
  document.querySelector('.table-wrap').scrollTo({top:0,behavior:'smooth'});
}

// === CSV EXPORT ===
function exportCSV(){
  const headers=['Semáforo','Empresa','Mina','Sección','Mineral','Vendedor','Cotizaciones','Facturas','Revenue MXN','Última Actividad','Contacto','Teléfono','Email','Dirección','Web','Odoo ID','CRM Opps','En Odoo','Estado'];
  const rows=filtered.map(r=>[
    r.status,r.empresa,r.mina,r.seccion,r.mineral,r.vendedor,r.cotizaciones,r.facturas,r.revenue_mxn,r.ultima_actividad,r.contacto,r.telefono,r.email,r.direccion,r.web,r.odoo_id,r.crm_opps,r.en_odoo,r.estado
  ]);
  let csv='\uFEFF'+headers.join(',')+'\n';
  rows.forEach(r=>{csv+=r.map(v=>`"${(v===null||v===undefined?'':String(v)).replace(/"/g,'""')}"`).join(',')+'\n'});
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='directorio_minero_mesabi_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}
