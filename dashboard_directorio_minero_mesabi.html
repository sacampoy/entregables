<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESABI — Directorio Minero Sonora 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#C07A28;--bg:#0f1117;--card:#1a1d27;--card2:#22252f;--border:#2a2d37;--text:#e0e0e0;--text2:#999;--green:#22c55e;--yellow:#eab308;--red:#ef4444;--teal:#14b8a6;--purple:#a855f7;--blue:#3b82f6;--orange:#f97316;--gray:#6b7280}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1600px;margin:0 auto;padding:20px}
header{text-align:center;padding:30px 0 20px;border-bottom:2px solid var(--gold)}
header h1{font-size:2rem;color:var(--gold);letter-spacing:2px}
header .subtitle{color:var(--text2);margin-top:6px;font-size:.95rem}
header .generated{color:var(--text2);margin-top:4px;font-size:.8rem;opacity:.7}

/* KPI Cards */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin:24px 0}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;text-align:center;transition:transform .15s}
.kpi:hover{transform:translateY(-2px)}
.kpi .value{font-size:1.8rem;font-weight:700;color:var(--gold)}
.kpi .label{font-size:.8rem;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.kpi.revenue .value{font-size:1.4rem}

/* Filters */
.filters{display:flex;flex-wrap:wrap;gap:10px;margin:20px 0;align-items:center}
.filters input[type=text]{background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:.9rem;min-width:240px;outline:none}
.filters input[type=text]:focus{border-color:var(--gold)}
.filters select{background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:.9rem;outline:none;cursor:pointer;min-width:160px}
.filters select:focus{border-color:var(--gold)}
.btn{background:var(--gold);color:#fff;border:none;padding:10px 18px;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);background:transparent}

/* Active filters */
.active-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;min-height:0}
.filter-chip{background:var(--card2);border:1px solid var(--gold);color:var(--gold);padding:4px 12px;border-radius:20px;font-size:.75rem;display:inline-flex;align-items:center;gap:6px;cursor:pointer}
.filter-chip:hover{background:var(--gold);color:#fff}
.filter-chip .x{font-weight:700}

/* Table */
.table-info{display:flex;justify-content:space-between;align-items:center;margin:10px 0;color:var(--text2);font-size:.85rem}
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.82rem}
thead{background:var(--card);position:sticky;top:0;z-index:2}
th{padding:12px 10px;text-align:left;color:var(--gold);font-weight:600;cursor:pointer;user-select:none;white-space:nowrap;border-bottom:2px solid var(--border)}
th:hover{color:#fff}
th .sort-arrow{margin-left:4px;font-size:.7rem;opacity:.5}
th.sorted .sort-arrow{opacity:1}
td{padding:10px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover{background:rgba(192,122,40,.08)}
tr.no-odoo{background:rgba(239,68,68,.06)}
tr.no-odoo:hover{background:rgba(239,68,68,.12)}
tr.expandable{cursor:pointer}

/* Semáforo */
.semaforo{font-size:1.1rem;text-align:center}

/* Badges */
.badge{padding:3px 10px;border-radius:12px;font-size:.7rem;font-weight:600;white-space:nowrap;display:inline-block}
.badge-metalica{background:rgba(192,122,40,.2);color:var(--gold)}
.badge-nometalica{background:rgba(20,184,166,.2);color:var(--teal)}
.badge-exploracion{background:rgba(168,85,247,.2);color:var(--purple)}
.badge-perforacion{background:rgba(59,130,246,.2);color:var(--blue)}
.badge-contratistas{background:rgba(249,115,22,.2);color:var(--orange)}
.badge-maquinaria{background:rgba(34,197,94,.2);color:var(--green)}
.badge-construccion{background:rgba(107,114,128,.2);color:var(--gray)}

/* Expand row */
.detail-row{display:none}
.detail-row.open{display:table-row}
.detail-row td{padding:12px 20px;background:var(--card);border-bottom:1px solid var(--border)}
.detail-content{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px;font-size:.82rem}
.detail-content .d-label{color:var(--text2);font-size:.75rem}
.detail-content .d-value{color:var(--text)}
.detail-content a{color:var(--gold);text-decoration:none}
.detail-content a:hover{text-decoration:underline}

/* Pagination */
.pagination{display:flex;justify-content:center;align-items:center;gap:8px;margin:20px 0}
.pagination button{background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:6px;cursor:pointer;font-size:.85rem}
.pagination button:hover{border-color:var(--gold)}
.pagination button.active{background:var(--gold);color:#fff;border-color:var(--gold)}
.pagination button:disabled{opacity:.3;cursor:default}
.pagination .page-info{color:var(--text2);font-size:.85rem}

/* Email */
a.email-link{color:var(--gold);text-decoration:none}
a.email-link:hover{text-decoration:underline}

/* Revenue */
.revenue{text-align:right;font-variant-numeric:tabular-nums}
.count{text-align:center}

/* Responsive */
@media(max-width:768px){
 .container{padding:10px}
 header h1{font-size:1.4rem}
 .kpi-grid{grid-template-columns:repeat(2,1fr)}
 .filters{flex-direction:column}
 .filters input,.filters select{width:100%;min-width:auto}
}
</style>
</head>

const SECTION_BADGE = {
'MINERÍA METÁLICA':['badge-metalica','Metálica'],
'MINERÍA NO METÁLICA':['badge-nometalica','No Metálica'],
'EMPRESAS DE EXPLORACIÓN':['badge-exploracion','Exploración'],
'PERFORACIÓN MINERA':['badge-perforacion','Perforación'],
'CONTRATISTAS MINEROS':['badge-contratistas','Contratistas'],
'MAQUINARIA Y EQUIPO':['badge-maquinaria','Maquinaria'],
'CONSTRUCCIÓN':['badge-construccion','Construcción']
};
const STATUS_ICON = {'ACTIVO':'🟢','COTIZADO':'🟡','EN ODOO':'⚪','NO EN ODOO':'🔴'};
const STATUS_ORDER = {'ACTIVO':0,'COTIZADO':1,'EN ODOO':2,'NO EN ODOO':3};
const PER_PAGE = 50;

let data = DATA_JSON;
let filtered = [...data];
let sortCol = null, sortDir = 1;
let page = 0;
let expandedId = null;

const cols = [
{key:'status',label:'',w:'40px',sort:(a,b)=>(STATUS_ORDER[a.status]||9)-(STATUS_ORDER[b.status]||9)},
{key:'empresa',label:'Empresa',sort:'str'},
{key:'mina',label:'Mina/Proyecto',sort:'str'},
{key:'seccion',label:'Sección',sort:'str'},
{key:'mineral',label:'Mineral/Actividad',sort:'str'},
{key:'vendedor',label:'Vendedor',sort:'str'},
{key:'cotizaciones',label:'Cotiz.',sort:'num'},
{key:'facturas',label:'Fact.',sort:'num'},
{key:'revenue_mxn',label:'Revenue MXN',sort:'num'},
{key:'ultima_actividad',label:'Últ. Actividad',sort:'str'},
{key:'contacto',label:'Contacto',sort:'str'},
{key:'telefono',label:'Teléfono',sort:'str'},
{key:'email',label:'Email',sort:'str'}
];

function init(){
 document.getElementById('generated').textContent='Generado: '+new Date().toLocaleString('es-MX',{timeZone:'America/Hermosillo',day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'})+ ' hrs';
 populateFilters();
 buildHeader();
 applyFilters();
 document.getElementById('search').addEventListener('input',()=>{page=0;applyFilters()});
 document.getElementById('fSeccion').addEventListener('change',()=>{page=0;applyFilters()});
 document.getElementById('fStatus').addEventListener('change',()=>{page=0;applyFilters()});
 document.getElementById('fVendedor').addEventListener('change',()=>{page=0;applyFilters()});
 document.getElementById('clearBtn').addEventListener('click',clearFilters);
 document.getElementById('csvBtn').addEventListener('click',exportCSV);
}

function populateFilters(){
 const secs=[...new Set(data.map(d=>d.seccion).filter(Boolean))].sort();
 const stats=['ACTIVO','COTIZADO','EN ODOO','NO EN ODOO'];
 const vends=[...new Set(data.map(d=>d.vendedor).filter(Boolean))].sort();
 const fS=document.getElementById('fSeccion');
 secs.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;fS.appendChild(o)});
 const fSt=document.getElementById('fStatus');
 stats.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;fSt.appendChild(o)});
 const fV=document.getElementById('fVendedor');
 vends.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;fV.appendChild(o)});
}

function buildHeader(){
 const tr=document.getElementById('thead');
 cols.forEach((c,i)=>{
  const th=document.createElement('th');
  th.innerHTML=c.label+'<span class="sort-arrow">▲</span>';
  th.addEventListener('click',()=>sortBy(i));
  tr.appendChild(th);
 });
}

function sortBy(idx){
 if(sortCol===idx){sortDir*=-1}else{sortCol=idx;sortDir=1}
 const c=cols[idx];
 const ths=document.getElementById('thead').children;
 [...ths].forEach((t,i)=>{t.classList.toggle('sorted',i===idx);t.querySelector('.sort-arrow').textContent=i===idx?(sortDir===1?'▲':'▼'):'▲'});
 filtered.sort((a,b)=>{
  if(c.sort==='str'){return sortDir*((a[c.key]||'').localeCompare(b[c.key]||'','es'))}
  if(c.sort==='num'){return sortDir*((a[c.key]||0)-(b[c.key]||0))}
  if(typeof c.sort==='function'){return sortDir*c.sort(a,b)}
  return 0;
 });
 page=0;
 render();
}

function applyFilters(){
 const q=(document.getElementById('search').value||'').toLowerCase();
 const sec=document.getElementById('fSeccion').value;
 const st=document.getElementById('fStatus').value;
 const ve=document.getElementById('fVendedor').value;
 filtered=data.filter(d=>{
  if(sec&&d.seccion!==sec)return false;
  if(st&&d.status!==st)return false;
  if(ve&&d.vendedor!==ve)return false;
  if(q){
   const hay=[d.empresa,d.mina,d.mineral,d.contacto,d.vendedor,d.email,d.telefono,d.direccion].join(' ').toLowerCase();
   if(!hay.includes(q))return false;
  }
  return true;
 });
 if(sortCol!==null)sortBy(sortCol);
 updateKPIs();
 updateChips();
 render();
}

function updateKPIs(){
 const total=filtered.length;
 const enOdoo=filtered.filter(d=>d.en_odoo==='Sí').length;
 const activo=filtered.filter(d=>d.status==='ACTIVO').length;
 const cotizado=filtered.filter(d=>d.status==='COTIZADO').length;
 const noOdoo=filtered.filter(d=>d.status==='NO EN ODOO').length;
 const rev=filtered.reduce((s,d)=>s+(d.revenue_mxn||0),0);
 document.getElementById('kpis').innerHTML=[
  kpiCard(total,'Total empresas'),
  kpiCard(enOdoo,'En Odoo'),
  kpiCard(activo,'Con ventas (ACTIVO)'),
  kpiCard(cotizado,'Cotizadas sin venta'),
  kpiCard(noOdoo,'NO en Odoo (oportunidad)'),
  kpiCard('$'+formatMXN(rev),'Revenue total MXN','revenue')
 ].join('');
}

function kpiCard(v,l,cls=''){return `<div class="kpi ${cls}"><div class="value">${v}</div><div class="label">${l}</div></div>`}

function formatMXN(n){if(!n)return '0';return Math.round(n).toLocaleString('es-MX')}

function updateChips(){
 const box=document.getElementById('activeFilters');
 const chips=[];
 const q=document.getElementById('search').value;
 const sec=document.getElementById('fSeccion').value;
 const st=document.getElementById('fStatus').value;
 const ve=document.getElementById('fVendedor').value;
 if(q)chips.push({label:'Búsqueda: '+q,clear:()=>{document.getElementById('search').value='';applyFilters()}});
 if(sec)chips.push({label:sec,clear:()=>{document.getElementById('fSeccion').value='';applyFilters()}});
 if(st)chips.push({label:st,clear:()=>{document.getElementById('fStatus').value='';applyFilters()}});
 if(ve)chips.push({label:ve,clear:()=>{document.getElementById('fVendedor').value='';applyFilters()}});
 box.innerHTML='';
 chips.forEach(c=>{
  const el=document.createElement('span');
  el.className='filter-chip';
  el.innerHTML=c.label+' <span class="x">✕</span>';
  el.addEventListener('click',c.clear);
  box.appendChild(el);
 });
}

function clearFilters(){
 document.getElementById('search').value='';
 document.getElementById('fSeccion').value='';
 document.getElementById('fStatus').value='';
 document.getElementById('fVendedor').value='';
 page=0;applyFilters();
}

function render(){
 const start=page*PER_PAGE;
 const slice=filtered.slice(start,start+PER_PAGE);
 document.getElementById('tableCount').textContent=`Mostrando ${start+1}–${Math.min(start+PER_PAGE,filtered.length)} de ${filtered.length} empresas`;
 const tbody=document.getElementById('tbody');
 tbody.innerHTML='';
 slice.forEach((d,i)=>{
  const idx=start+i;
  const tr=document.createElement('tr');
  tr.className='expandable'+(d.status==='NO EN ODOO'?' no-odoo':'');
  tr.addEventListener('click',()=>toggleExpand(idx));
  const sb=SECTION_BADGE[d.seccion]||['badge-construccion','?'];
  const emails=(d.email||'').split(/[|,;]/).map(e=>e.trim()).filter(Boolean);
  const emailHtml=emails.length?emails.map(e=>`<a class="email-link" href="mailto:${e}" onclick="event.stopPropagation()">${e.length>25?e.substring(0,23)+'…':e}</a>`).join('<br>'):'—';
  tr.innerHTML=`
   <td class="semaforo">${STATUS_ICON[d.status]||'⚪'}</td>
   <td><strong>${esc(d.empresa)}</strong></td>
   <td>${esc(d.mina)}</td>
   <td><span class="badge ${sb[0]}">${sb[1]}</span></td>
   <td>${esc(d.mineral)}</td>
   <td>${esc(d.vendedor)}</td>
   <td class="count">${d.cotizaciones||0}</td>
   <td class="count">${d.facturas||0}</td>
   <td class="revenue">${d.revenue_mxn?'$'+formatMXN(d.revenue_mxn):'—'}</td>
   <td>${d.ultima_actividad||'—'}</td>
   <td>${esc(d.contacto)}</td>
   <td>${esc(d.telefono)}</td>
   <td>${emailHtml}</td>`;
  tbody.appendChild(tr);
  // detail row
  const dr=document.createElement('tr');
  dr.className='detail-row';
  dr.id='detail-'+idx;
  const webLink=d.web?`<a href="${d.web.startsWith('http')?d.web:'https://'+d.web}" target="_blank" onclick="event.stopPropagation()">${esc(d.web)}</a>`:'—';
  dr.innerHTML=`<td colspan="${cols.length}"><div class="detail-content">
   <div><div class="d-label">Dirección</div><div class="d-value">${esc(d.direccion)||'—'}</div></div>
   <div><div class="d-label">Sitio Web</div><div class="d-value">${webLink}</div></div>
   <div><div class="d-label">Odoo ID</div><div class="d-value">${d.odoo_id||'—'}</div></div>
   <div><div class="d-label">CRM Oportunidades</div><div class="d-value">${d.crm_opps||0}</div></div>
   <div><div class="d-label">Estado</div><div class="d-value">${esc(d.estado)||'—'}</div></div>
   <div><div class="d-label">En Odoo</div><div class="d-value">${d.en_odoo}</div></div>
  </div></td>`;
  tbody.appendChild(dr);
 });
 renderPagination();
}

function toggleExpand(idx){
 const el=document.getElementById('detail-'+idx);
 if(!el)return;
 if(expandedId!==null&&expandedId!==idx){
  const prev=document.getElementById('detail-'+expandedId);
  if(prev)prev.classList.remove('open');
 }
 el.classList.toggle('open');
 expandedId=el.classList.contains('open')?idx:null;
}

function renderPagination(){
 const totalPages=Math.ceil(filtered.length/PER_PAGE);
 const box=document.getElementById('pagination');
 if(totalPages<=1){box.innerHTML='';return}
 let html='<button '+(page===0?'disabled':'')+' onclick="goPage('+(page-1)+')">← Anterior</button>';
 for(let i=0;i<totalPages;i++){
  html+=`<button class="${i===page?'active':''}" onclick="goPage(${i})">${i+1}</button>`;
 }
 html+='<button '+(page>=totalPages-1?'disabled':'')+' onclick="goPage('+(page+1)+')">Siguiente →</button>';
 box.innerHTML=html;
}
function goPage(p){page=p;expandedId=null;render();document.querySelector('.table-wrap').scrollIntoView({behavior:'smooth'})}

function exportCSV(){
 const headers=['Status','Empresa','Mina','Sección','Mineral','Vendedor','Cotizaciones','Facturas','Revenue MXN','Última Actividad','Contacto','Teléfono','Email','Dirección','Web','Odoo ID','CRM Opps','En Odoo'];
 const rows=filtered.map(d=>[d.status,d.empresa,d.mina,d.seccion,d.mineral,d.vendedor,d.cotizaciones,d.facturas,d.revenue_mxn,d.ultima_actividad,d.contacto,d.telefono,d.email,d.direccion,d.web,d.odoo_id,d.crm_opps,d.en_odoo].map(v=>'"'+(String(v||'').replace(/"/g,'""'))+'"').join(','));
 const csv='\uFEFF'+headers.join(',')+'\n'+rows.join('\n');
 const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
 const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='directorio_minero_mesabi.csv';a.click();
}

function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

init();
</script>
