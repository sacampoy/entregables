<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESABI — Directorio Minero vs Odoo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#C07A28;--gold-light:#D4923A;--gold-dark:#9A6220;--bg:#0f1117;--bg2:#1a1d27;--bg3:#222636;--text:#e0e0e0;--text-dim:#8a8fa0;--green:#22c55e;--yellow:#eab308;--blue:#3b82f6;--white-dot:#94a3b8;--red:#ef4444;--red-bg:rgba(239,68,68,.06)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--gold-light);text-decoration:none}a:hover{text-decoration:underline}

/* Header */
.header{background:linear-gradient(135deg,#1a1510 0%,#1a1d27 60%);border-bottom:2px solid var(--gold);padding:24px 32px}
.header h1{font-size:1.8rem;color:var(--gold);letter-spacing:1px}
.header .subtitle{color:var(--text-dim);font-size:.9rem;margin-top:4px}
.header .gen-date{color:var(--text-dim);font-size:.75rem;margin-top:2px}

/* KPI Cards */
.kpi-row{display:flex;gap:12px;padding:16px 32px;flex-wrap:wrap}
.kpi{background:var(--bg2);border:1px solid #2a2e3e;border-radius:10px;padding:14px 18px;flex:1;min-width:140px}
.kpi .label{font-size:.7rem;text-transform:uppercase;color:var(--text-dim);letter-spacing:.5px}
.kpi .value{font-size:1.5rem;font-weight:700;margin-top:4px;color:var(--gold)}
.kpi.green .value{color:var(--green)}.kpi.red .value{color:var(--red)}.kpi.blue .value{color:var(--blue)}.kpi.yellow .value{color:var(--yellow)}

/* Filters */
.filters{padding:12px 32px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.filters input,.filters select{background:var(--bg3);border:1px solid #3a3e50;color:var(--text);padding:8px 12px;border-radius:6px;font-size:.85rem;outline:none}
.filters input:focus,.filters select:focus{border-color:var(--gold)}
.filters input[type=text]{min-width:220px}
.btn{background:var(--gold);color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:.82rem;font-weight:600}
.btn:hover{background:var(--gold-light)}
.btn-outline{background:transparent;border:1px solid var(--gold);color:var(--gold)}
.btn-outline:hover{background:var(--gold);color:#fff}

/* Table */
.table-wrap{padding:0 32px 24px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.8rem}
thead{position:sticky;top:0;z-index:2}
th{background:var(--bg2);color:var(--gold);padding:10px 8px;text-align:left;cursor:pointer;user-select:none;border-bottom:2px solid var(--gold-dark);white-space:nowrap;font-size:.75rem;text-transform:uppercase;letter-spacing:.3px}
th:hover{color:var(--gold-light)}
th .sort-arrow{margin-left:4px;font-size:.65rem}
td{padding:8px;border-bottom:1px solid #1e2230;vertical-align:middle}
tr:hover td{background:rgba(192,122,40,.06)}
tr.no-odoo td{background:var(--red-bg)}
tr.no-odoo:hover td{background:rgba(239,68,68,.12)}
tr.expanded-parent td{border-bottom:none}

/* Semáforo */
.dot{width:14px;height:14px;border-radius:50%;display:inline-block}
.dot.activo{background:var(--green);box-shadow:0 0 6px var(--green)}
.dot.cotizado{background:var(--yellow);box-shadow:0 0 6px var(--yellow)}
.dot.crm{background:var(--blue);box-shadow:0 0 6px var(--blue)}
.dot.en-odoo{background:var(--white-dot)}
.dot.no-odoo{background:var(--red);box-shadow:0 0 6px var(--red)}

/* Badges */
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.7rem;font-weight:600}
.badge-metalica{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.3)}
.badge-no-metalica{background:rgba(168,85,247,.15);color:#c084fc;border:1px solid rgba(168,85,247,.3)}
.badge-status{padding:2px 8px;border-radius:4px;font-size:.68rem;font-weight:600}
.badge-activo{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.badge-cotizado{background:rgba(234,179,8,.15);color:#facc15;border:1px solid rgba(234,179,8,.3)}
.badge-crm{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.3)}
.badge-en-odoo{background:rgba(148,163,184,.15);color:#94a3b8;border:1px solid rgba(148,163,184,.3)}
.badge-no-en-odoo{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)}

/* Expanded row */
.detail-row{display:none}
.detail-row.open{display:table-row}
.detail-row td{background:var(--bg3);padding:16px 24px;border-bottom:2px solid var(--gold-dark)}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.detail-item{font-size:.8rem}
.detail-item .dl{color:var(--text-dim);font-size:.7rem;text-transform:uppercase;margin-bottom:2px}
.detail-item .dv{color:var(--text)}

/* Pagination */
.pagination{padding:16px 32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.pagination .info{color:var(--text-dim);font-size:.8rem}
.page-btns{display:flex;gap:4px}
.page-btns button{background:var(--bg3);color:var(--text);border:1px solid #3a3e50;padding:6px 12px;border-radius:4px;cursor:pointer;font-size:.8rem}
.page-btns button:hover{border-color:var(--gold)}
.page-btns button.active{background:var(--gold);color:#fff;border-color:var(--gold)}
.page-btns button:disabled{opacity:.3;cursor:default}

/* Footer */
.footer{text-align:center;padding:16px;color:var(--text-dim);font-size:.7rem;border-top:1px solid #1e2230}

/* Mobile */
@media(max-width:768px){
  .header{padding:16px}.kpi-row{padding:8px 16px}.filters{padding:8px 16px}
  .table-wrap{padding:0 8px 16px}.pagination{padding:8px 16px}
  .kpi{min-width:100px;padding:10px}
  .kpi .value{font-size:1.1rem}
  .detail-grid{grid-template-columns:1fr}
}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:3px}
</style>
</head>

// State
let filtered = [...DATA];
let sortCol = null, sortAsc = true;
let page = 1;
const PER_PAGE = 50;
let expandedIdx = null;

// Columns config
const COLS = [
  {key:'_semaforo',label:'',sort:false,w:'40px'},
  {key:'empresa',label:'Empresa',sort:true},
  {key:'mina',label:'Mina',sort:true},
  {key:'seccion',label:'Sección',sort:true},
  {key:'mineral',label:'Mineral',sort:true},
  {key:'vendedor',label:'Vendedor',sort:true},
  {key:'cotizaciones',label:'Cotiz.',sort:true,num:true},
  {key:'facturas',label:'Fact.',sort:true,num:true},
  {key:'revenue_mxn',label:'Revenue MXN',sort:true,num:true},
  {key:'ultima_actividad',label:'Últ. Actividad',sort:true},
  {key:'contacto',label:'Contacto',sort:true},
  {key:'telefono',label:'Teléfono',sort:false},
  {key:'email',label:'Email',sort:false}
];

const STATUS_MAP = {
  'ACTIVO':{cls:'activo',badge:'badge-activo'},
  'COTIZADO':{cls:'cotizado',badge:'badge-cotizado'},
  'CRM':{cls:'crm',badge:'badge-crm'},
  'EN ODOO':{cls:'en-odoo',badge:'badge-en-odoo'},
  'NO EN ODOO':{cls:'no-odoo',badge:'badge-no-en-odoo'}
};

function init(){
  // Gen date
  const now = new Date();
  const opts = {year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'America/Hermosillo'};
  document.getElementById('genDate').textContent = 'Generado: ' + now.toLocaleDateString('es-MX',opts) + ' hrs (Hermosillo)';

  buildFilters();
  buildKPIs();
  buildThead();
  applyFilters();

  document.getElementById('search').addEventListener('input', ()=>{page=1;applyFilters()});
  document.getElementById('fSeccion').addEventListener('change', ()=>{page=1;applyFilters()});
  document.getElementById('fStatus').addEventListener('change', ()=>{page=1;applyFilters()});
  document.getElementById('fVendedor').addEventListener('change', ()=>{page=1;applyFilters()});
}

function buildFilters(){
  const secciones = [...new Set(DATA.map(d=>d.seccion).filter(Boolean))].sort();
  const statuses = ['ACTIVO','COTIZADO','CRM','EN ODOO','NO EN ODOO'];
  const vendedores = [...new Set(DATA.map(d=>d.vendedor).filter(Boolean))].sort();

  const fS = document.getElementById('fSeccion');
  secciones.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s.replace('MINERÍA ','');fS.appendChild(o)});

  const fSt = document.getElementById('fStatus');
  statuses.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;fSt.appendChild(o)});

  const fV = document.getElementById('fVendedor');
  vendedores.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;fV.appendChild(o)});
}

function buildKPIs(){
  const total = DATA.length;
  const enOdoo = DATA.filter(d=>d.en_odoo==='Sí').length;
  const activo = DATA.filter(d=>d.status==='ACTIVO').length;
  const cotizado = DATA.filter(d=>d.status==='COTIZADO').length;
  const noOdoo = DATA.filter(d=>d.status==='NO EN ODOO').length;
  const rev = DATA.reduce((s,d)=>s+(d.revenue_mxn||0),0);

  const kpis = [
    {label:'Total Empresas Mineras',value:total,cls:''},
    {label:'En Odoo',value:enOdoo,cls:'blue'},
    {label:'Con Ventas (Activo)',value:activo,cls:'green'},
    {label:'Cotizadas sin Venta',value:cotizado,cls:'yellow'},
    {label:'NO en Odoo (Oportunidad)',value:noOdoo,cls:'red'},
    {label:'Revenue Total MXN',value:fmtMoney(rev),cls:''}
  ];

  const c = document.getElementById('kpis');
  c.innerHTML = kpis.map(k=>`<div class="kpi ${k.cls}"><div class="label">${k.label}</div><div class="value">${k.value}</div></div>`).join('');
}

function buildThead(){
  const tr = document.getElementById('thead');
  tr.innerHTML = COLS.map((c,i)=>{
    const arrow = c.sort ? '<span class="sort-arrow">⇅</span>' : '';
    return `<th data-idx="${i}" ${c.w?'style="width:'+c.w+'"':''}>${c.label}${arrow}</th>`;
  }).join('');

  tr.querySelectorAll('th').forEach(th=>{
    const idx = +th.dataset.idx;
    if(COLS[idx].sort) th.addEventListener('click',()=>sortBy(idx));
  });
}

function sortBy(idx){
  const col = COLS[idx];
  if(sortCol===col.key){sortAsc=!sortAsc}else{sortCol=col.key;sortAsc=true}
  expandedIdx=null;
  applyFilters();
}

function applyFilters(){
  const q = document.getElementById('search').value.toLowerCase().trim();
  const fSec = document.getElementById('fSeccion').value;
  const fSt = document.getElementById('fStatus').value;
  const fV = document.getElementById('fVendedor').value;

  filtered = DATA.filter(d=>{
    if(fSec && d.seccion!==fSec) return false;
    if(fSt && d.status!==fSt) return false;
    if(fV && d.vendedor!==fV) return false;
    if(q){
      const hay = [d.empresa,d.mina,d.mineral,d.contacto,d.email,d.telefono,d.vendedor,d.direccion].join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  if(sortCol){
    const col = COLS.find(c=>c.key===sortCol);
    filtered.sort((a,b)=>{
      let va=a[sortCol],vb=b[sortCol];
      if(col&&col.num){va=va||0;vb=vb||0;return sortAsc?va-vb:vb-va}
      va=(va||'').toString().toLowerCase();vb=(vb||'').toString().toLowerCase();
      return sortAsc?va.localeCompare(vb):vb.localeCompare(va);
    });
  }

  renderTable();
  renderPagination();
}

function renderTable(){
  const start=(page-1)*PER_PAGE;
  const slice=filtered.slice(start,start+PER_PAGE);
  const tbody=document.getElementById('tbody');
  let html='';

  slice.forEach((d,i)=>{
    const globalIdx=start+i;
    const st=STATUS_MAP[d.status]||STATUS_MAP['NO EN ODOO'];
    const isNoOdoo=d.status==='NO EN ODOO';
    const isExpanded=expandedIdx===globalIdx;

    html+=`<tr class="${isNoOdoo?'no-odoo':''} ${isExpanded?'expanded-parent':''}" data-idx="${globalIdx}" onclick="toggleRow(${globalIdx})">`;
    html+=`<td><span class="dot ${st.cls}"></span></td>`;
    html+=`<td><strong>${esc(d.empresa)}</strong></td>`;
    html+=`<td>${esc(d.mina)}</td>`;
    html+=`<td>${seccionBadge(d.seccion)}</td>`;
    html+=`<td style="max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${esc(d.mineral)}">${esc(d.mineral)}</td>`;
    html+=`<td>${esc(d.vendedor)}</td>`;
    html+=`<td style="text-align:center">${d.cotizaciones||'—'}</td>`;
    html+=`<td style="text-align:center">${d.facturas||'—'}</td>`;
    html+=`<td style="text-align:right">${d.revenue_mxn?fmtMoney(d.revenue_mxn):'—'}</td>`;
    html+=`<td>${d.ultima_actividad||'—'}</td>`;
    html+=`<td style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${esc(d.contacto)}">${esc(d.contacto)||'—'}</td>`;
    html+=`<td style="white-space:nowrap">${esc(d.telefono)||'—'}</td>`;
    html+=`<td>${emailLinks(d.email)}</td>`;
    html+=`</tr>`;

    // Detail row
    html+=`<tr class="detail-row ${isExpanded?'open':''}" id="detail-${globalIdx}"><td colspan="${COLS.length}">`;
    html+=`<div class="detail-grid">`;
    html+=detailItem('Status',`<span class="badge-status ${st.badge}">${d.status}</span>`);
    html+=detailItem('Empresa',esc(d.empresa));
    html+=detailItem('Mina',esc(d.mina)||'—');
    html+=detailItem('Sección',esc(d.seccion));
    html+=detailItem('Mineral',esc(d.mineral)||'—');
    html+=detailItem('Vendedor',esc(d.vendedor)||'—');
    html+=detailItem('Contacto',esc(d.contacto)||'—');
    html+=detailItem('Teléfono',esc(d.telefono)||'—');
    html+=detailItem('Email',emailLinks(d.email));
    html+=detailItem('Dirección',esc(d.direccion)||'—');
    html+=detailItem('Sitio Web',d.web?`<a href="${d.web.startsWith('http')?d.web:'https://'+d.web}" target="_blank">${esc(d.web)}</a>`:'—');
    html+=detailItem('Estado',esc(d.estado)||'—');
    html+=detailItem('En Odoo',d.en_odoo);
    html+=detailItem('Odoo ID',d.odoo_id||'—');
    html+=detailItem('Cotizaciones',d.cotizaciones);
    html+=detailItem('Facturas',d.facturas);
    html+=detailItem('Oportunidades CRM',d.crm_opps);
    html+=detailItem('Revenue MXN',d.revenue_mxn?fmtMoney(d.revenue_mxn):'$0');
    html+=detailItem('Última Actividad',d.ultima_actividad||'—');
    html+=`</div></td></tr>`;
  });

  tbody.innerHTML=html;
}

function renderPagination(){
  const total=filtered.length;
  const pages=Math.ceil(total/PER_PAGE)||1;
  const start=(page-1)*PER_PAGE+1;
  const end=Math.min(page*PER_PAGE,total);

  document.getElementById('pageInfo').textContent=`Mostrando ${total?start:0}–${end} de ${total} empresas`;

  let btns='';
  btns+=`<button ${page<=1?'disabled':''} onclick="goPage(${page-1})">← Ant.</button>`;
  for(let p=1;p<=pages;p++){
    if(pages>7&&Math.abs(p-page)>2&&p!==1&&p!==pages){
      if(p===2||p===pages-1) btns+='<button disabled>…</button>';
      continue;
    }
    btns+=`<button class="${p===page?'active':''}" onclick="goPage(${p})">${p}</button>`;
  }
  btns+=`<button ${page>=pages?'disabled':''} onclick="goPage(${page+1})">Sig. →</button>`;
  document.getElementById('pageBtns').innerHTML=btns;
}

function goPage(p){page=p;expandedIdx=null;renderTable();renderPagination();document.querySelector('.table-wrap').scrollTop=0}

function toggleRow(idx){
  expandedIdx=expandedIdx===idx?null:idx;
  renderTable();
}

function clearFilters(){
  document.getElementById('search').value='';
  document.getElementById('fSeccion').value='';
  document.getElementById('fStatus').value='';
  document.getElementById('fVendedor').value='';
  sortCol=null;sortAsc=true;page=1;expandedIdx=null;
  applyFilters();
}

function exportCSV(){
  const headers=['Empresa','Mina','Sección','Mineral','Teléfono','Email','Contacto','Dirección','Web','Estado','Vendedor','Status','En Odoo','Cotizaciones','Facturas','CRM Opps','Revenue MXN','Última Actividad','Odoo ID'];
  const keys=['empresa','mina','seccion','mineral','telefono','email','contacto','direccion','web','estado','vendedor','status','en_odoo','cotizaciones','facturas','crm_opps','revenue_mxn','ultima_actividad','odoo_id'];
  let csv=headers.map(h=>'"'+h+'"').join(',')+'\n';
  filtered.forEach(d=>{
    csv+=keys.map(k=>{
      let v=(d[k]===null||d[k]===undefined)?'':d[k];
      return '"'+String(v).replace(/"/g,'""')+'"';
    }).join(',')+'\n';
  });
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='directorio_minero_mesabi.csv';a.click();
  URL.revokeObjectURL(url);
}

// Helpers
function fmtMoney(n){return '$'+Number(n).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2})}
function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function seccionBadge(s){
  if(!s)return '—';
  if(s.includes('METÁLICA')&&!s.includes('NO ')){return '<span class="badge badge-metalica">Metálica</span>'}
  return '<span class="badge badge-no-metalica">No Metálica</span>';
}
function emailLinks(e){
  if(!e)return '—';
  return e.split(/[|,;/]/).map(x=>x.trim()).filter(Boolean).map(x=>{
    if(x.includes('@'))return `<a href="mailto:${x}" title="${x}">${x.length>25?x.substring(0,25)+'…':x}</a>`;
    return '';
  }).filter(Boolean).join(', ')||'—';
}
function detailItem(label,value){return `<div class="detail-item"><div class="dl">${label}</div><div class="dv">${value}</div></div>`}

init();
