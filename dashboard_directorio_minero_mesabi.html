<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#C07A28;--bg:#0f1117;--card:#1a1d27;--card2:#22252f;--text:#e0e0e0;--text2:#999;--red:#c0392b;--green:#27ae60;--yellow:#f1c40f;--teal:#1abc9c;--purple:#8e44ad;--blue:#2980b9;--orange:#e67e22;--gray:#7f8c8d;--border:#2a2d37}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#1a1410 0%,#2a1f14 50%,#1a1410 100%);border-bottom:2px solid var(--gold);padding:24px 32px;text-align:center}
.header h1{font-size:28px;color:var(--gold);letter-spacing:2px;margin-bottom:4px}
.header .subtitle{color:var(--text2);font-size:14px;margin-bottom:4px}
.header .generated{color:var(--text2);font-size:12px;opacity:.7}
.container{max-width:1800px;margin:0 auto;padding:20px}
.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--card);border-radius:10px;padding:18px 16px;text-align:center;border:1px solid var(--border);transition:transform .15s}
.kpi:hover{transform:translateY(-2px)}
.kpi .label{font-size:11px;text-transform:uppercase;color:var(--text2);letter-spacing:1px;margin-bottom:6px}
.kpi .value{font-size:28px;font-weight:700;color:var(--gold)}
.kpi.green .value{color:var(--green)}
.kpi.red .value{color:var(--red)}
.kpi.yellow .value{color:var(--yellow)}
.kpi.teal .value{color:var(--teal)}
.filters{background:var(--card);border-radius:10px;padding:16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;border:1px solid var(--border)}
.filters input[type=text]{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:6px;font-size:13px;width:260px;outline:none}
.filters input[type=text]:focus{border-color:var(--gold)}
.filters select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:13px;outline:none;cursor:pointer;min-width:160px}
.filters select:focus{border-color:var(--gold)}
.btn{background:var(--gold);color:#fff;border:none;padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.active-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.chip{background:var(--card2);border:1px solid var(--gold);color:var(--gold);padding:4px 10px;border-radius:20px;font-size:11px;display:inline-flex;align-items:center;gap:6px;cursor:pointer}
.chip:hover{background:var(--gold);color:#fff}
.chip .x{font-weight:700}
.table-wrap{background:var(--card);border-radius:10px;border:1px solid var(--border);overflow:hidden}
.table-info{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2)}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{background:var(--card2);padding:10px 8px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);cursor:pointer;user-select:none;white-space:nowrap;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:2}
thead th:hover{color:var(--gold)}
thead th .sort-arrow{margin-left:4px;font-size:10px;opacity:.5}
thead th.sorted .sort-arrow{opacity:1;color:var(--gold)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer}
tbody tr:hover{background:rgba(192,122,40,.08)}
tbody tr.no-odoo{background:rgba(192,57,43,.1)}
tbody tr.no-odoo:hover{background:rgba(192,57,43,.18)}
tbody td{padding:8px;vertical-align:middle;white-space:nowrap}
.semaforo{font-size:16px;text-align:center}
.badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;display:inline-block;white-space:nowrap}
.badge-metalica{background:rgba(192,122,40,.2);color:#d4a04a;border:1px solid rgba(192,122,40,.3)}
.badge-nometalica{background:rgba(26,188,156,.15);color:var(--teal);border:1px solid rgba(26,188,156,.3)}
.badge-exploracion{background:rgba(142,68,173,.15);color:#b370d4;border:1px solid rgba(142,68,173,.3)}
.badge-perforacion{background:rgba(41,128,185,.15);color:#5dade2;border:1px solid rgba(41,128,185,.3)}
.badge-contratistas{background:rgba(230,126,34,.15);color:var(--orange);border:1px solid rgba(230,126,34,.3)}
.badge-maquinaria{background:rgba(39,174,96,.15);color:var(--green);border:1px solid rgba(39,174,96,.3)}
.badge-construccion{background:rgba(127,140,141,.15);color:var(--gray);border:1px solid rgba(127,140,141,.3)}
a{color:var(--gold);text-decoration:none}
a:hover{text-decoration:underline}
.expand-row{display:none}
.expand-row td{padding:12px 16px;background:var(--card2);border-bottom:2px solid var(--gold)}
.expand-row.open{display:table-row}
.expand-content{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px;font-size:12px}
.expand-content .field{color:var(--text2)}
.expand-content .field span{color:var(--text);display:block;margin-top:2px}
.pagination{display:flex;justify-content:center;align-items:center;gap:8px;padding:16px;font-size:13px;color:var(--text2)}
.pagination button{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px}
.pagination button:hover{border-color:var(--gold);color:var(--gold)}
.pagination button:disabled{opacity:.3;cursor:default}
.pagination .current{color:var(--gold);font-weight:700}
.revenue{color:var(--green);font-weight:600}
.truncate{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media(max-width:900px){.kpi-row{grid-template-columns:repeat(3,1fr)}.filters{flex-direction:column}.filters input[type=text],.filters select{width:100%}}
</style>
</head>

const PAGE_SIZE=100;
let filtered=[...DATA];
let sortCol=null,sortAsc=true,currentPage=0;

const now=new Date();

// Semáforo logic
function semaforo(r){
  if(r.status==='ACTIVO')return{icon:'🟢',order:1};
  if(r.status==='COTIZADO')return{icon:'🟡',order:2};
  if(r.status==='EN ODOO')return{icon:'⚪',order:3};
  return{icon:'🔴',order:4};
}

// Section badge
function secBadge(s){
  if(!s)return'';
  const map={'MINERÍA METÁLICA':['Metálica','badge-metalica'],'MINERÍA NO METÁLICA':['No Metálica','badge-nometalica'],
  'EMPRESAS DE EXPLORACIÓN':['Exploración','badge-exploracion'],'PERFORACIÓN MINERA':['Perforación','badge-perforacion'],
  'CONTRATISTAS MINEROS':['Contratistas','badge-contratistas'],'MAQUINARIA Y EQUIPO':['Maquinaria','badge-maquinaria'],
  'CONSTRUCCIÓN':['Construcción','badge-construccion']};
  const m=map[s]||[s,''];
  return `<span class="badge ${m[1]}">${m[0]}</span>`;
}

function fmtMoney(v){if(!v)return'—';return'$'+Number(v).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2})}
function emailLinks(e){if(!e)return'';return e.split(/[|,;]/).map(x=>x.trim()).filter(Boolean).map(x=>`<a href="mailto:${x}">${x}</a>`).join('<br>')}

// Populate filters
function populateFilters(){
  const secs=[...new Set(DATA.map(d=>d.seccion).filter(Boolean))].sort();
  const stats=[...new Set(DATA.map(d=>d.status).filter(Boolean))].sort();
  const vends=[...new Set(DATA.map(d=>d.vendedor).filter(Boolean))].sort();
  const fS=document.getElementById('fSeccion');secs.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;fS.appendChild(o)});
  const fSt=document.getElementById('fStatus');stats.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;fSt.appendChild(o)});
  const fV=document.getElementById('fVendedor');vends.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;fV.appendChild(o)});
}

// KPIs
function renderKPIs(){
  const total=filtered.length;
  const enOdoo=filtered.filter(d=>d.en_odoo==='Sí').length;
  const activo=filtered.filter(d=>d.status==='ACTIVO').length;
  const cotizadas=filtered.filter(d=>d.cotizaciones>0).length;
  const noOdoo=filtered.filter(d=>d.en_odoo==='No').length;
  const rev=filtered.reduce((a,d)=>a+(d.revenue_mxn||0),0);
  document.getElementById('kpis').innerHTML=`
    <div class="kpi"><div class="label">Total Empresas</div><div class="value">${total}</div></div>
    <div class="kpi teal"><div class="label">En Odoo</div><div class="value">${enOdoo}</div></div>
    <div class="kpi green"><div class="label">ACTIVO</div><div class="value">${activo}</div></div>
    <div class="kpi yellow"><div class="label">Cotizadas</div><div class="value">${cotizadas}</div></div>
    <div class="kpi red"><div class="label">NO en Odoo</div><div class="value">${noOdoo}</div></div>
    <div class="kpi"><div class="label">Revenue MXN</div><div class="value" style="font-size:22px">${fmtMoney(rev)}</div></div>`;
}

// Filter
function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase();
  const sec=document.getElementById('fSeccion').value;
  const st=document.getElementById('fStatus').value;
  const ve=document.getElementById('fVendedor').value;
  filtered=DATA.filter(d=>{
    if(sec&&d.seccion!==sec)return false;
    if(st&&d.status!==st)return false;
    if(ve&&d.vendedor!==ve)return false;
    if(q){const hay=[d.empresa,d.mina,d.mineral,d.contacto,d.vendedor,d.email,d.telefono].join(' ').toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });
  if(sortCol)doSort(sortCol,false);
  currentPage=0;
  renderKPIs();renderChips();renderTable();
}

function renderChips(){
  const c=document.getElementById('activeFilters');c.innerHTML='';
  const q=document.getElementById('search').value;
  const sec=document.getElementById('fSeccion').value;
  const st=document.getElementById('fStatus').value;
  const ve=document.getElementById('fVendedor').value;
  if(q)c.innerHTML+=`<span class="chip" onclick="document.getElementById('search').value='';applyFilters()">Búsqueda: "${q}" <span class="x">✕</span></span>`;
  if(sec)c.innerHTML+=`<span class="chip" onclick="document.getElementById('fSeccion').value='';applyFilters()">Sección: ${sec} <span class="x">✕</span></span>`;
  if(st)c.innerHTML+=`<span class="chip" onclick="document.getElementById('fStatus').value='';applyFilters()">Status: ${st} <span class="x">✕</span></span>`;
  if(ve)c.innerHTML+=`<span class="chip" onclick="document.getElementById('fVendedor').value='';applyFilters()">Vendedor: ${ve} <span class="x">✕</span></span>`;
}

// Sort
function doSort(col,toggle=true){
  if(toggle){if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=true;}}
  const numCols=['cotizaciones','facturas','revenue_mxn','semaforo'];
  filtered.sort((a,b)=>{
    let va,vb;
    if(col==='semaforo'){va=semaforo(a).order;vb=semaforo(b).order;}
    else{va=a[col];vb=b[col];}
    if(va==null)va='';if(vb==null)vb='';
    if(numCols.includes(col)){va=Number(va)||0;vb=Number(vb)||0;return sortAsc?va-vb:vb-va;}
    if(col==='ultima_actividad'){return sortAsc?String(va).localeCompare(String(vb)):String(vb).localeCompare(String(va));}
    return sortAsc?String(va).localeCompare(String(vb)):String(vb).localeCompare(String(va));
  });
  document.querySelectorAll('thead th').forEach(th=>{
    th.classList.remove('sorted');
    th.querySelector('.sort-arrow').textContent='';
  });
  const th=document.querySelector(`thead th[data-col="${col}"]`);
  if(th){th.classList.add('sorted');th.querySelector('.sort-arrow').textContent=sortAsc?' ▲':' ▼';}
  currentPage=0;
  renderTable();
}

// Table

    tr.innerHTML=`

      <td class="truncate" title="${esc(d.empresa)}">${esc(d.empresa)}</td>

      <td>${secBadge(d.seccion)}</td>
      <td class="truncate" title="${esc(d.mineral)}">${esc(d.mineral)||'—'}</td>
      <td>${esc(d.vendedor)||'—'}</td>
      <td style="text-align:center">${d.cotizaciones||'—'}</td>
      <td style="text-align:center">${d.facturas||'—'}</td>
      <td class="revenue">${d.revenue_mxn?fmtMoney(d.revenue_mxn):'—'}</td>
      <td>${d.ultima_actividad||'—'}</td>
      <td class="truncate" title="${esc(d.contacto)}">${esc(d.contacto)||'—'}</td>
      <td style="font-size:11px">${esc(d.telefono)||'—'}</td>
      <td style="font-size:11px">${emailLinks(d.email)}</td>`;
    tr.onclick=()=>toggleExpand(idx);
    tbody.appendChild(tr);

    const etr=document.createElement('tr');
    etr.className='expand-row';
    etr.id='exp-'+idx;
    etr.innerHTML=`<td colspan="13"><div class="expand-content">
      <div class="field">📍 Dirección<span>${esc(d.direccion)||'—'}</span></div>
      <div class="field">🌐 Web<span>${d.web?`<a href="${d.web.startsWith('http')?d.web:'https://'+d.web}" target="_blank">${esc(d.web)}</a>`:'—'}</span></div>
      <div class="field">🆔 Odoo ID<span>${d.odoo_id||'—'}</span></div>
      <div class="field">📊 CRM Opps<span>${d.crm_opps||'—'}</span></div>
      <div class="field">📋 Status<span>${d.status}</span></div>
      <div class="field">🏢 Estado<span>${esc(d.estado)||'—'}</span></div>
    </div></td>`;
    tbody.appendChild(etr);
  });
  document.getElementById('tableCount').textContent=`${filtered.length} empresas`;
  renderPagination();
}

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function toggleExpand(idx){
  const el=document.getElementById('exp-'+idx);
  if(el)el.classList.toggle('open');
}

function renderPagination(){
  const totalPages=Math.ceil(filtered.length/PAGE_SIZE);
  const div=document.getElementById('pagination');
  if(totalPages<=1){div.innerHTML='';return;}
  div.innerHTML=`<button ${currentPage===0?'disabled':''} onclick="currentPage--;renderTable()">← Anterior</button>
    <span>Página <span class="current">${currentPage+1}</span> de ${totalPages}</span>
    <button ${currentPage>=totalPages-1?'disabled':''} onclick="currentPage++;renderTable()">Siguiente →</button>`;
}

// CSV Export
function exportCSV(){
  const headers=['empresa','mina','seccion','mineral','telefono','email','contacto','direccion','web','estado','vendedor','status','en_odoo','cotizaciones','facturas','crm_opps','revenue_mxn','ultima_actividad','odoo_id'];
  let csv=headers.join(',')+'\n';
  filtered.forEach(d=>{csv+=headers.map(h=>{let v=d[h]??'';return'"'+String(v).replace(/"/g,'""')+'"'}).join(',')+'\n';});
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='directorio_minero_mesabi.csv';a.click();
}

// Events
document.getElementById('search').addEventListener('input',applyFilters);
document.getElementById('fSeccion').addEventListener('change',applyFilters);
document.getElementById('fStatus').addEventListener('change',applyFilters);
document.getElementById('fVendedor').addEventListener('change',applyFilters);
document.getElementById('clearAll').addEventListener('click',()=>{
  document.getElementById('search').value='';
  document.getElementById('fSeccion').value='';
  document.getElementById('fStatus').value='';
  document.getElementById('fVendedor').value='';
  applyFilters();
});
document.getElementById('csvBtn').addEventListener('click',exportCSV);
document.querySelectorAll('thead th').forEach(th=>{
  th.addEventListener('click',()=>doSort(th.dataset.col));
});

// Init
populateFilters();
renderKPIs();
renderTable();
</script>
